<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ammar des</title>
<style>
body{
font-family:Arial;
background:#0f0f0f;
color:white;
margin:0;
padding:0;
}
header{
padding:60px 20px;
text-align:center;
background:linear-gradient(135deg,#d946ef,#3b82f6);
}
h1{font-size:60px;margin:0}
.container{max-width:1200px;margin:auto;padding:20px}
.upload-box{
background:#1e1e1e;
padding:20px;
border-radius:20px;
margin-bottom:30px;
}
input,textarea,button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:12px;
}
button{
background:#d946ef;
color:white;
font-size:18px;
cursor:pointer;
}
.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
}
.card{
background:#1e1e1e;
border-radius:20px;
overflow:hidden;
}
.card img,.card video{
width:100%;
height:250px;
object-fit:cover;
}
.card-content{padding:15px}
a{
color:#60a5fa;
text-decoration:none;
}
</style>
</head>
<body>

<header>
<h1>Ammar des</h1>
<p>موقع تصميم احترافي لعرض الصور والفيديوهات والروابط</p>
</header>

<div class="container">

<div class="upload-box">
<h2>إضافة مشروع جديد</h2>

<input type="text" id="title" placeholder="عنوان المشروع">

<input type="url" id="link" placeholder="رابط المشروع">

<input type="file" id="file">

<textarea id="desc" placeholder="وصف المشروع"></textarea>

<button onclick="addProject()">رفع المشروع</button>
</div>

<div class="gallery" id="gallery"></div>

</div>

<script>
function addProject(){
const title=document.getElementById('title').value;
const link=document.getElementById('link').value;
const desc=document.getElementById('desc').value;
const file=document.getElementById('file').files[0];

if(!title || !file){
alert('ضيف عنوان وملف');
return;
}

const gallery=document.getElementById('gallery');
const card=document.createElement('div');
card.className='card';

const url=URL.createObjectURL(file);

let media='';

if(file.type.startsWith('video')){
media=`<video controls><source src="${url}"></video>`;
}else{
media=`<img src="${url}">`;
}

card.innerHTML=`
${media}
<div class="card-content">
<h3>${title}</h3>
<p>${desc}</p>
<a href="${link}" target="_blank">فتح الرابط</a>
</div>
`;

gallery.prepend(card);

document.getElementById('title').value='';
document.getElementById('link').value='';
document.getElementById('desc').value='';
document.getElementById('file').value='';
}
</script>

</body>
</html>
